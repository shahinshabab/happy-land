<!DOCTYPE html>
<html lang="en">
<head>

  <link rel="stylesheet" href="style.css" />

<body>
  <header class="site-header">
    <div class="container nav-wrap">
      <a href="index.html" class="brand">
        <img src="assets/logo/logo.png" alt="Happy Land Logo" class="brand-logo" />
        <div class="brand-text">
          <span class="brand-title">Happy Land Foodstuff</span>
          <span class="brand-subtitle">Trading LLC</span>
        </div>
      </a>

      <button class="menu-toggle" id="menuToggle" aria-label="Open menu">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <nav class="main-nav" id="mainNav">
        <ul class="nav-list">
          <li><a href="index.html">Home</a></li>

          <li class="has-dropdown">
            <button class="dropdown-btn" type="button">
              Products
              <span class="arrow">▾</span>
            </button>
            <ul class="dropdown-menu">
              <li><a href="#water">Water</a></li>
              <li><a href="#concentrated-drinks">Concentrated Drinks</a></li>
              <li><a href="#packed-rice">Packed Rice</a></li>
              <li><a href="#grocery-items">Grocery Items</a></li>
            </ul>

          <li><a href="about.html">About Us</a></li>
          <li><a href="ecatalogue.html">E-Catalogue</a></li>
          <li><a href="wholesale.html">Wholesale</a></li>
        </ul>

  <main>
    <!-- Promotion Banner -->
    <section class="promo-hero" id="home">
      <img
        id="promoImage"
        src="assets/promotions/ramadan-sale.jpg"
        alt="Promotion Banner"
        class="promo-image"
      />
    </section>

    <!-- Promotion Top Selling Products -->
    <section class="promo-products-section" id="promoProductsSection">
      <div class="container">
        <h2 class="promo-products-heading" id="promoProductsHeading">
          Top Selling Products
        </h2>

        <div class="promo-products-marquee">
          <div class="promo-products-track" id="promoProductsTrack"></div>
        </div>
      </div>
    </section>

  </main>

  <footer class="site-footer">
    <div class="container footer-wrap">
      <p>© 2026 Happy Land Foodstuff Trading LLC. All rights reserved.</p>
    </div>
  </footer>

  <script src="script.js"></script>
